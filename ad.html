<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support — Ad</title>
<!-- Google AdSense — replace ca-pub-XXXXXXXXXXXXXXXX with your publisher ID -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2363598755601957" crossorigin="anonymous"></script>
<style>

:root {
  --bg:         #0d1117;
  --surface:    #161b22;
  --surface-2:  #1c2128;
  --border:     #30363d;
  --text:       #e6edf3;
  --text-muted: #8b949e;
  --text-dim:   #484f58;
  --accent:     #58a6ff;
  --accent-h:   #79b8ff;
  --font:       -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  --radius:     6px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.6;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px;
}

a { color: var(--accent); text-decoration: none; }
a:hover { color: var(--accent-h); text-decoration: underline; }

.ad-page {
  width: 100%;
  max-width: 700px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* Back button */
.btn-back {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 7px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-muted);
  font-size: 13px;
  font-weight: 500;
  text-decoration: none;
  transition: background 0.15s, color 0.15s;
  align-self: flex-start;
}
.btn-back:hover { background: var(--surface-2); color: var(--text); text-decoration: none; }

/* Ad card */
.ad-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.ad-card-header {
  background: var(--surface-2);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--text-muted);
}
.ad-card-body {
  padding: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}

.ad-thankyou {
  font-size: 14px;
  color: var(--text-muted);
  text-align: center;
}

/* AdSense slot */
.ad-slot {
  width: 100%;
  min-height: 250px;
  background: var(--bg);
  border-radius: calc(var(--radius) - 2px);
  overflow: hidden;
}
.ad-slot ins.adsbygoogle {
  display: block;
}

.ad-cookie-note {
  font-size: 11px;
  color: var(--text-dim);
  text-align: center;
}

</style>
</head>
<body>

<div class="ad-page">

  <!-- Back button -->
  <a class="btn-back" href="index.html">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
    Back to Home
  </a>

  <!-- Ad card -->
  <div class="ad-card">
    <div class="ad-card-header">One Small Ad</div>
    <div class="ad-card-body">

      <p class="ad-thankyou">The only ad on the site. Thanks for supporting. 🙏</p>

      <!-- ADSENSE SLOT — replace data-ad-client and data-ad-slot with your real values -->
      <div class="ad-slot">
        <ins class="adsbygoogle"
             style="display:block;"
             data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
             data-ad-slot="XXXXXXXXXX"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
      </div>

      <p class="ad-cookie-note">Ad uses cookies for delivery and measurement.</p>

    </div>
  </div>

</div>

</body>
</html>
