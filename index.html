<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>
<style>

:root {
  --bg:         #0d1117;
  --surface:    #161b22;
  --surface-2:  #1c2128;
  --border:     #30363d;
  --border-sub: #21262d;
  --text:       #e6edf3;
  --text-muted: #8b949e;
  --text-dim:   #484f58;
  --accent:     #58a6ff;
  --accent-h:   #79b8ff;
  --font:       -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  --radius:     6px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.6;
}

a { color: var(--accent); text-decoration: none; }
a:hover { color: var(--accent-h); text-decoration: underline; }

/* ── Layout ── */
.layout {
  display: grid;
  grid-template-columns: 260px 1fr;
  height: 100vh;
}

/* ── Left panel ── */
.left-panel {
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

.panel-section-header {
  padding: 10px 14px 8px;
  border-bottom: 1px solid var(--border);
  background: var(--surface-2);
  flex-shrink: 0;
}
.panel-section-header h2 {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-muted);
}

.pages-section {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
  background: var(--surface);
}
.pages-list {
  flex: 1;
  overflow-y: auto;
  padding: 4px 0;
}
.page-entry {
  display: block;
  padding: 7px 14px;
  font-size: 13px;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border-sub);
  transition: background 0.1s, color 0.1s;
}
.page-entry:last-child { border-bottom: none; }
.page-entry:hover { background: rgba(255,255,255,0.04); color: var(--text); text-decoration: none; }

.links-section {
  flex-shrink: 0;
  background: var(--surface-2);
  border-top: 1px solid var(--border);
}
.link-entry {
  display: block;
  padding: 7px 14px;
  font-size: 13px;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border-sub);
  transition: background 0.1s, color 0.1s;
}
.link-entry:last-child { border-bottom: none; }
.link-entry:hover { background: rgba(255,255,255,0.04); color: var(--text); text-decoration: none; }

/* ── Centre ── */
.main {
  padding: 16px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.welcome-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 26px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.welcome-panel h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
.welcome-panel p  { font-size: 13px; color: var(--text-muted); }
.welcome-smiley {
  font-size: 32px;
  font-family: monospace;
  color: var(--accent);
  user-select: none;
  margin-left: 20px;
  flex-shrink: 0;
}

/* ── Content grid ──
   Row 1: YouTube (full width)
   Row 2: Discord | Ad
─────────────────── */
.content-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: auto auto;
  gap: 12px;
  flex: 1;
  min-height: 0;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.card-header {
  background: var(--surface-2);
  border-bottom: 1px solid var(--border);
  padding: 7px 14px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--text-muted);
  flex-shrink: 0;
}
.card-body {
  padding: 12px;
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* YouTube */
.yt-card { grid-column: 1 / 3; grid-row: 1; }
.yt-wrap {
  width: 100%;
  aspect-ratio: 16 / 9;
  border-radius: calc(var(--radius) - 2px);
  overflow: hidden;
  background: #000;
}
.yt-wrap iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}

/* Discord */
.discord-card { grid-column: 1; grid-row: 2; }
.btn-discord {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 9px 22px;
  background: #5865f2;
  border: 1px solid #4752c4;
  border-radius: var(--radius);
  color: #fff;
  font-size: 14px;
  font-weight: 500;
  text-decoration: none;
  transition: background 0.15s;
}
.btn-discord:hover { background: #4752c4; color: #fff; text-decoration: none; }

/* Ad card */
.ad-card { grid-column: 2; grid-row: 2; }
.ad-card .card-body {
  flex-direction: column;
  gap: 8px;
}
.btn-view-ad {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 9px 22px;
  background: #238636;
  border: 1px solid #2ea043;
  border-radius: var(--radius);
  color: #fff;
  font-size: 14px;
  font-weight: 500;
  text-decoration: none;
  transition: background 0.15s;
  white-space: nowrap;
}
.btn-view-ad:hover { background: #2ea043; color: #fff; text-decoration: none; }
.ad-cookie-note {
  font-size: 11px;
  color: var(--text-dim);
}

</style>
</head>
